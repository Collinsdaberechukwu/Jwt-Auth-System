spring:
  application:
    name: Jwt-Auth-System

  datasource:
    url: jdbc:mysql://localhost:3306/jwtAuthSystemDb?useSSL=false&serverTimezone=UTC
    username: root
    password: "@Collins20"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 9081

resilience4j:
  ratelimiter:
    instances:

      authLimiter:
        limitForPeriod: 3
        limitRefreshPeriod: 1m
        timeoutDuration: 2m
        ignored-exceptions:
          - com.collins.Jwt_Auth_System.exception.InvalidLoginException
          - com.collins.Jwt_Auth_System.exception.ResourceNotFoundException